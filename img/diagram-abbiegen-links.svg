<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="sans-serif">
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#aaa"/>
    </marker>
    <marker id="arrOnc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>
  <style>
    .road  { fill: #ddd; }
    .edge  { stroke: #fff; stroke-width: 3; }
    .center{ stroke: #fff; stroke-width: 2; stroke-dasharray: 12 10; }
    .car-you { fill: #1976d2; stroke: #0d47a1; stroke-width: 1.5; }
    .car-on  { fill: #d32f2f; stroke: #b71c1c; stroke-width: 1.5; }
    .ped   { fill: #4caf50; }
    .traj  { stroke: #1976d2; stroke-width: 2.5; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrB); }
    .flow  { stroke: #aaa; stroke-width: 1.5; fill: none; marker-end: url(#arrFlow); }
    .onc-path { stroke: #c62828; stroke-width: 2; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrOnc); }
    .head  { font-size: 15px; font-weight: 700; fill: #111; }
    .lbl   { font-size: 12px; fill: #111; }
    .stop  { font-size: 12px; font-weight: 700; fill: #c62828; }
    .note  { font-size: 11px; fill: #555; }
  </style>

  <text class="head" x="10" y="20">Левый поворот — кому уступить</text>

  <!-- Horizontal road -->
  <rect class="road" x="0"   y="160" width="500" height="120"/>
  <line class="edge"   x1="0" y1="160" x2="500" y2="160"/>
  <line class="edge"   x1="0" y1="280" x2="500" y2="280"/>
  <line class="center" x1="0" y1="220" x2="500" y2="220"/>

  <!-- Vertical road (above) -->
  <rect class="road" x="200" y="0"   width="100" height="160"/>
  <line class="edge"   x1="200" y1="0" x2="200" y2="160"/>
  <line class="edge"   x1="300" y1="0" x2="300" y2="160"/>
  <line class="center" x1="250" y1="0" x2="250" y2="160"/>

  <!-- Vertical road (below) -->
  <rect class="road" x="200" y="280" width="100" height="120"/>
  <line class="edge"   x1="200" y1="280" x2="200" y2="400"/>
  <line class="edge"   x1="300" y1="280" x2="300" y2="400"/>
  <line class="center" x1="250" y1="280" x2="250" y2="400"/>

  <!-- Traffic flow arrows (grey, subtle) -->
  <!-- Your lane: going right → -->
  <line class="flow" x1="60" y1="248" x2="160" y2="248"/>
  <!-- Oncoming lane: going left ← (reversed arrow direction) -->
  <line class="flow" x1="140" y1="188" x2="40"  y2="188"/>

  <!-- YOU: in right lane (y=230), going right, want to turn left (upward) -->
  <rect class="car-you" x="50" y="230" width="40" height="22" rx="3"/>
  <text class="lbl"  x="10"  y="270">ты →</text>
  <text class="lbl"  x="10"  y="284">хочешь налево ↑</text>

  <!-- Trajectory of your left turn -->
  <path class="traj" d="M 90 241 Q 235 235 245 80"/>

  <!-- ONCOMING car: in left lane (y=177), going left ← -->
  <rect class="car-on" x="320" y="177" width="40" height="22" rx="3"/>
  <text class="lbl"  x="368" y="183">встречный ←</text>
  <path class="onc-path" d="M 320 188 L 210 188"/>
  <text class="stop" x="368" y="198">уступаешь</text>

  <!-- Pedestrians on the street you turn INTO (vertical road, right side = x=250-300) -->
  <circle class="ped" cx="262" cy="110" r="6"/>
  <circle class="ped" cx="278" cy="110" r="6"/>
  <line x1="220" y1="130" x2="259" y2="117" stroke="#4caf50" stroke-width="1.2"/>
  <text class="lbl"  x="310" y="100">пешеходы в улице,</text>
  <text class="lbl"  x="310" y="115">куда поворачиваешь —</text>
  <text class="stop" x="310" y="130">уступаешь</text>

  <!-- Summary -->
  <text class="head" x="10" y="328">Уступаешь: встречным, велосипедистам, пешеходам в целевой улице, трамваю.</text>
  <text class="note" x="10" y="348">Два едут навстречу и оба налево → разъезжаются друг перед другом (voreinander).</text>
</svg>
