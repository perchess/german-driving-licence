<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="320" rx="14" fill="#1a1d24"/>
  <text x="320" y="28" text-anchor="middle" fill="#e8e8e8" font-size="17" font-weight="bold">Kombiinstrument — приборная панель</text>

  <!-- Drehzahlmesser (tachometer / rpm) -->
  <g>
    <circle cx="160" cy="180" r="92" fill="#0f1116" stroke="#3a8ddb" stroke-width="3"/>
    <text x="160" y="150" text-anchor="middle" fill="#9fb8d6" font-size="13">x1000</text>
    <text x="160" y="170" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1/min</text>
    <!-- ticks -->
    <text x="100" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
    <text x="98" y="150" text-anchor="middle" fill="#bbb" font-size="12">3</text>
    <text x="160" y="115" text-anchor="middle" fill="#bbb" font-size="12">5</text>
    <text x="222" y="150" text-anchor="middle" fill="#e05a5a" font-size="12">7</text>
    <text x="220" y="245" text-anchor="middle" fill="#e05a5a" font-size="12">8</text>
    <line x1="160" y1="180" x2="118" y2="135" stroke="#ff5a5a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="160" cy="180" r="7" fill="#888"/>
  </g>
  <text x="160" y="300" text-anchor="middle" fill="#e8e8e8" font-size="13">der Drehzahlmesser</text>
  <text x="160" y="317" text-anchor="middle" fill="#8fd6a0" font-size="12">тахометр (обороты)</text>

  <!-- Tachometer (speedometer) -->
  <g>
    <circle cx="480" cy="180" r="92" fill="#0f1116" stroke="#3a8ddb" stroke-width="3"/>
    <text x="480" y="150" text-anchor="middle" fill="#9fb8d6" font-size="13">km/h</text>
    <text x="480" y="170" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">50</text>
    <text x="420" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
    <text x="418" y="150" text-anchor="middle" fill="#bbb" font-size="12">60</text>
    <text x="480" y="115" text-anchor="middle" fill="#bbb" font-size="12">120</text>
    <text x="542" y="150" text-anchor="middle" fill="#bbb" font-size="12">180</text>
    <text x="540" y="245" text-anchor="middle" fill="#bbb" font-size="12">240</text>
    <line x1="480" y1="180" x2="445" y2="148" stroke="#ffd24a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="480" cy="180" r="7" fill="#888"/>
  </g>
  <text x="480" y="300" text-anchor="middle" fill="#e8e8e8" font-size="13">der Tachometer</text>
  <text x="480" y="317" text-anchor="middle" fill="#8fd6a0" font-size="12">спидометр</text>

  <!-- center stack: fuel + temp -->
  <g>
    <rect x="288" y="120" width="64" height="120" rx="8" fill="#0f1116" stroke="#444" stroke-width="2"/>
    <!-- fuel -->
    <text x="320" y="140" text-anchor="middle" fill="#9fb8d6" font-size="11">E ▮▮▮ F</text>
    <text x="320" y="158" text-anchor="middle" fill="#ffd24a" font-size="16">⛽</text>
    <text x="320" y="176" text-anchor="middle" fill="#cfd6e0" font-size="10">Tankanzeige</text>
    <text x="320" y="189" text-anchor="middle" fill="#8fd6a0" font-size="10">топливо</text>
    <!-- temp -->
    <text x="320" y="212" text-anchor="middle" fill="#e05a5a" font-size="16">🌡</text>
    <text x="320" y="226" text-anchor="middle" fill="#cfd6e0" font-size="9">Kühlmittel-</text>
    <text x="320" y="236" text-anchor="middle" fill="#cfd6e0" font-size="9">temperatur</text>
  </g>
  <text x="320" y="260" text-anchor="middle" fill="#8fd6a0" font-size="10">температура ОЖ</text>
</svg>
