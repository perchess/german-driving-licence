<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="sans-serif">
  <style>
    .road { fill: #ddd; }
    .edge { stroke: #fff; stroke-width: 3; }
    .center { stroke: #fff; stroke-width: 2; stroke-dasharray: 12 10; }
    .car { fill: #1976d2; stroke: #0d47a1; stroke-width: 1.5; }
    .bike { fill: #f9a825; stroke: #f57f17; stroke-width: 1.5; }
    .dim { stroke: #c62828; stroke-width: 2; fill: none; marker-start: url(#dimL); marker-end: url(#dimR); }
    .head { font-size: 16px; font-weight: 700; fill: #111; }
    .sub { font-size: 13px; fill: #c62828; font-weight: 700; }
    .lbl { font-size: 13px; fill: #111; }
  </style>
  <defs>
    <marker id="dimL" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#c62828"/>
    </marker>
    <marker id="dimR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>

  <text class="head" x="20" y="22">Seitenabstand при обгоне велосипедиста (§ 5 StVO с 2020)</text>

  <!-- INNERORTS scene -->
  <text class="lbl" x="20" y="50" font-weight="700">Innerorts (внутри города): минимум 1,5 м</text>
  <rect class="road" x="20" y="60" width="300" height="100"/>
  <line class="edge" x1="20" y1="60" x2="320" y2="60"/>
  <line class="edge" x1="20" y1="160" x2="320" y2="160"/>
  <line class="center" x1="20" y1="110" x2="320" y2="110"/>

  <!-- Bike -->
  <rect class="bike" x="50" y="130" width="18" height="22" rx="3"/>
  <text class="lbl" x="46" y="170">велосипедист</text>
  <!-- Overtaking car -->
  <rect class="car" x="48" y="74" width="40" height="22" rx="3"/>
  <text class="lbl" x="38" y="105">PKW обгоняет</text>
  <!-- Dimension between bike (top of bike at y=130) and car (bottom at y=96) -->
  <line class="dim" x1="68" y1="96" x2="68" y2="130"/>
  <text class="sub" x="76" y="118">≥ 1,5 м</text>

  <!-- AUSSERORTS scene -->
  <text class="lbl" x="350" y="50" font-weight="700">Außerorts (вне города): минимум 2,0 м</text>
  <rect class="road" x="350" y="60" width="270" height="100"/>
  <line class="edge" x1="350" y1="60" x2="620" y2="60"/>
  <line class="edge" x1="350" y1="160" x2="620" y2="160"/>
  <line class="center" x1="350" y1="110" x2="620" y2="110"/>

  <rect class="bike" x="385" y="130" width="18" height="22" rx="3"/>
  <text class="lbl" x="378" y="170">велосипедист</text>
  <rect class="car" x="378" y="68" width="40" height="22" rx="3"/>
  <text class="lbl" x="370" y="105">PKW обгоняет</text>
  <line class="dim" x1="402" y1="90" x2="402" y2="130"/>
  <text class="sub" x="410" y="115">≥ 2,0 м</text>

  <text class="head" x="20" y="200">Если не выдерживаешь — НЕ обгоняй, езжай за велосипедистом.</text>
  <text class="lbl" x="20" y="225">Те же правила: пешеход, электросамокат, мопед.</text>
  <text class="lbl" x="20" y="245">При высокой собственной скорости — интервал ещё больше.</text>
  <text class="lbl" x="20" y="265">Особо широко: мотоциклист, конная повозка.</text>
</svg>
