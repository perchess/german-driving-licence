<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="sans-serif">
  <style>
    .road { fill: #ddd; }
    .edge { stroke: #fff; stroke-width: 3; }
    .center { stroke: #fff; stroke-width: 2; stroke-dasharray: 12 10; }
    .car { fill: #1976d2; stroke: #0d47a1; stroke-width: 1; }
    .crosswalk { fill: #fff; }
    .bus-sign-bg { fill: #ffeb3b; stroke: #f9a825; stroke-width: 2; }
    .head { font-size: 15px; font-weight: 700; fill: #111; }
    .lbl { font-size: 12px; fill: #111; }
    .dist { font-size: 13px; font-weight: 700; fill: #c62828; }
    .dim { stroke: #c62828; stroke-width: 2; fill: none; }
    .ban { fill: #c62828; opacity: 0.2; }
  </style>

  <text class="head" x="20" y="22">Парковка/остановка — обязательные дистанции</text>

  <!-- Scene 1: 5 m before/after crosswalk -->
  <g transform="translate(0, 40)">
    <rect class="road" x="20" y="20" width="660" height="80"/>
    <line class="edge" x1="20" y1="20" x2="680" y2="20"/>
    <line class="edge" x1="20" y1="100" x2="680" y2="100"/>
    <!-- Crosswalk stripes -->
    <g transform="translate(320, 22)">
      <rect class="crosswalk" x="0" y="0" width="60" height="10"/>
      <rect class="crosswalk" x="0" y="20" width="60" height="10"/>
      <rect class="crosswalk" x="0" y="40" width="60" height="10"/>
      <rect class="crosswalk" x="0" y="60" width="60" height="10"/>
    </g>
    <!-- Forbidden zones 5 m -->
    <rect class="ban" x="250" y="20" width="70" height="80"/>
    <rect class="ban" x="380" y="20" width="70" height="80"/>
    <text class="dist" x="260" y="60">5 м</text>
    <text class="dist" x="395" y="60">5 м</text>
    <text class="lbl" x="320" y="118">Zebrastreifen — НИКАКОЙ парковки/стоянки</text>
  </g>

  <!-- Scene 2: 15 m around bus stop -->
  <g transform="translate(0, 150)">
    <rect class="road" x="20" y="20" width="660" height="80"/>
    <line class="edge" x1="20" y1="20" x2="680" y2="20"/>
    <line class="edge" x1="20" y1="100" x2="680" y2="100"/>
    <!-- Haltestelle sign -->
    <g transform="translate(340, 0)">
      <circle class="bus-sign-bg" cx="10" cy="14" r="12"/>
      <text class="lbl" x="2" y="19" font-weight="700">H</text>
    </g>
    <!-- 15 m bans -->
    <rect class="ban" x="170" y="20" width="180" height="80"/>
    <rect class="ban" x="350" y="20" width="180" height="80"/>
    <text class="dist" x="240" y="60">15 м до</text>
    <text class="dist" x="420" y="60">15 м после</text>
    <text class="lbl" x="260" y="118">Знак «H» — автобусная/трамвайная остановка</text>
  </g>

  <!-- Scene 3: 50 m before Andreaskreuz (außerorts) -->
  <g transform="translate(0, 260)">
    <rect class="road" x="20" y="20" width="660" height="80"/>
    <line class="edge" x1="20" y1="20" x2="680" y2="20"/>
    <line class="edge" x1="20" y1="100" x2="680" y2="100"/>
    <!-- Andreaskreuz at right -->
    <g transform="translate(540, 30)">
      <line stroke="#c62828" stroke-width="4" x1="-15" y1="-15" x2="35" y2="35"/>
      <line stroke="#c62828" stroke-width="4" x1="35" y1="-15" x2="-15" y2="35"/>
    </g>
    <!-- 50 m ban -->
    <rect class="ban" x="155" y="20" width="385" height="80"/>
    <text class="dist" x="320" y="60">50 м (außerorts) / 5 м (innerorts)</text>
    <text class="lbl" x="280" y="118">Перед Andreaskreuz (ж/д переезд)</text>
  </g>
</svg>
