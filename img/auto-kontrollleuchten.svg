<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="560" rx="14" fill="#15171c"/>
  <text x="360" y="32" text-anchor="middle" fill="#f0f0f0" font-size="18" font-weight="bold">Kontrollleuchten — контрольные лампы</text>
  <text x="360" y="52" text-anchor="middle" fill="#9aa4b2" font-size="12">🔴 красный = стоп/опасно · 🟡 жёлтый = проверь · 🟢/🔵 = информация</text>

  <!-- row helper: each cell 180 wide, 120 tall, starting y=80 -->
  <!-- ROW 1 -->
  <g transform="translate(20,80)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="24">🛢</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Öldruck</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">давление масла</text>
  </g>
  <g transform="translate(200,80)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <rect x="26" y="20" width="28" height="20" rx="2" fill="none" stroke="#e04a4a" stroke-width="2"/>
    <text x="33" y="34" fill="#e04a4a" font-size="12" font-weight="bold">+−</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Ladekontrolle</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">зарядка АКБ</text>
  </g>
  <g transform="translate(380,80)">
    <circle cx="40" cy="30" r="26" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">⚙</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Motorkontrolle</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">Check Engine</text>
  </g>
  <g transform="translate(560,80)">
    <circle cx="40" cy="30" r="26" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="36" text-anchor="middle" fill="#ffd24a" font-size="14" font-weight="bold">ABS</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">ABS</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">антиблокировка</text>
  </g>

  <!-- ROW 2 -->
  <g transform="translate(20,220)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <text x="40" y="36" text-anchor="middle" fill="#e04a4a" font-size="16" font-weight="bold">(!)</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Bremsanlage</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">тормоз/ручник</text>
  </g>
  <g transform="translate(200,220)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">💺</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Sicherheitsgurt</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">ремень не пристёгнут</text>
  </g>
  <g transform="translate(380,220)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <text x="40" y="37" text-anchor="middle" font-size="20">🧍</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Airbag</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">подушка безопасности</text>
  </g>
  <g transform="translate(560,220)">
    <circle cx="40" cy="30" r="26" fill="#2a0d0d" stroke="#e04a4a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">🌡</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Kühlmitteltemp.</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">перегрев двигателя</text>
  </g>

  <!-- ROW 3 -->
  <g transform="translate(20,360)">
    <circle cx="40" cy="30" r="26" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">🛞</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Reifendruck</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">давление в шинах</text>
  </g>
  <g transform="translate(200,360)">
    <circle cx="40" cy="30" r="26" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">⛽</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Tankreserve</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">резерв топлива</text>
  </g>
  <g transform="translate(380,360)">
    <circle cx="40" cy="30" r="26" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="36" text-anchor="middle" fill="#ffd24a" font-size="22">〰</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">ESP / Schleuder</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">курсовая устойчивость</text>
  </g>
  <g transform="translate(560,360)">
    <circle cx="40" cy="30" r="26" fill="#0d1a2a" stroke="#4a9ae0" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">🔵</text>
    <text x="40" y="78" text-anchor="middle" fill="#f0f0f0" font-size="11">Fernlicht</text>
    <text x="40" y="93" text-anchor="middle" fill="#8fd6a0" font-size="10">дальний свет</text>
  </g>

  <!-- ROW 4 -->
  <g transform="translate(20,490)">
    <circle cx="40" cy="26" r="24" fill="#0d2a14" stroke="#4ae07a" stroke-width="2"/>
    <text x="40" y="33" text-anchor="middle" fill="#4ae07a" font-size="16" font-weight="bold">➤</text>
    <text x="40" y="68" text-anchor="middle" fill="#f0f0f0" font-size="11">Blinker</text>
    <text x="40" y="82" text-anchor="middle" fill="#8fd6a0" font-size="10">поворотник</text>
  </g>
  <g transform="translate(200,490)">
    <circle cx="40" cy="26" r="24" fill="#0d2214" stroke="#4ae07a" stroke-width="2"/>
    <text x="40" y="33" text-anchor="middle" fill="#4ae07a" font-size="20">≣</text>
    <text x="40" y="68" text-anchor="middle" fill="#f0f0f0" font-size="11">Abblendlicht</text>
    <text x="40" y="82" text-anchor="middle" fill="#8fd6a0" font-size="10">ближний свет</text>
  </g>
  <g transform="translate(380,490)">
    <circle cx="40" cy="26" r="24" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="33" text-anchor="middle" fill="#ffd24a" font-size="18">⟿</text>
    <text x="40" y="68" text-anchor="middle" fill="#f0f0f0" font-size="11">Vorglühen</text>
    <text x="40" y="82" text-anchor="middle" fill="#8fd6a0" font-size="10">свечи накала (дизель)</text>
  </g>
  <g transform="translate(560,490)">
    <circle cx="40" cy="26" r="24" fill="#2a200d" stroke="#ffd24a" stroke-width="2"/>
    <text x="40" y="33" text-anchor="middle" fill="#ffd24a" font-size="18">≋</text>
    <text x="40" y="68" text-anchor="middle" fill="#f0f0f0" font-size="11">Nebelschluss</text>
    <text x="40" y="82" text-anchor="middle" fill="#8fd6a0" font-size="10">задний противотуман.</text>
  </g>
</svg>
