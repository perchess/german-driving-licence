<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="680" height="470" rx="14" fill="#f4f6f9"/>
  <text x="340" y="30" text-anchor="middle" fill="#1a2330" font-size="18" font-weight="bold">Bedienelemente — органы управления</text>

  <!-- dashboard panel -->
  <path d="M60 80 Q340 55 620 80 L620 250 Q340 235 60 250 Z" fill="#d9dee6" stroke="#9aa4b2" stroke-width="2"/>

  <!-- steering wheel -->
  <circle cx="220" cy="180" r="62" fill="none" stroke="#2b3340" stroke-width="10"/>
  <circle cx="220" cy="180" r="16" fill="#2b3340"/>
  <line x1="220" y1="180" x2="170" y2="180" stroke="#2b3340" stroke-width="9"/>
  <line x1="220" y1="180" x2="270" y2="180" stroke="#2b3340" stroke-width="9"/>
  <line x1="220" y1="180" x2="220" y2="240" stroke="#2b3340" stroke-width="9"/>
  <text x="220" y="184" text-anchor="middle" fill="#ffd24a" font-size="11">📯</text>

  <!-- horn callout -->
  <text x="220" y="125" text-anchor="middle" fill="#1a2330" font-size="12" font-weight="bold">das Lenkrad / die Hupe</text>
  <text x="220" y="140" text-anchor="middle" fill="#2a7a3a" font-size="11">руль / сигнал (в центре)</text>

  <!-- left stalk: Blinker -->
  <line x1="158" y1="180" x2="118" y2="165" stroke="#3a3f48" stroke-width="6" stroke-linecap="round"/>
  <text x="92" y="150" text-anchor="end" fill="#1a2330" font-size="12" font-weight="bold">der Blinkerhebel</text>
  <text x="92" y="165" text-anchor="end" fill="#2a7a3a" font-size="11">рычаг поворотника</text>

  <!-- right stalk: wipers -->
  <line x1="282" y1="180" x2="322" y2="165" stroke="#3a3f48" stroke-width="6" stroke-linecap="round"/>
  <text x="345" y="150" text-anchor="start" fill="#1a2330" font-size="12" font-weight="bold">der Scheibenwischerhebel</text>
  <text x="345" y="165" text-anchor="start" fill="#2a7a3a" font-size="11">рычаг стеклоочистителей</text>

  <!-- ignition -->
  <circle cx="340" cy="195" r="14" fill="#b9c2cf" stroke="#5a6472" stroke-width="2"/>
  <text x="340" y="200" text-anchor="middle" fill="#2b3340" font-size="11">🔑</text>
  <text x="430" y="200" text-anchor="start" fill="#1a2330" font-size="12" font-weight="bold">das Zündschloss</text>
  <text x="430" y="215" text-anchor="start" fill="#2a7a3a" font-size="11">замок зажигания</text>

  <!-- light switch -->
  <circle cx="470" cy="160" r="16" fill="#2b3340"/>
  <text x="470" y="165" text-anchor="middle" fill="#ffd24a" font-size="13">💡</text>
  <text x="500" y="150" text-anchor="start" fill="#1a2330" font-size="12" font-weight="bold">der Lichtschalter</text>
  <text x="500" y="165" text-anchor="start" fill="#2a7a3a" font-size="11">переключатель света</text>

  <!-- hazard switch -->
  <rect x="540" y="190" width="26" height="26" rx="4" fill="#2b3340"/>
  <text x="553" y="208" text-anchor="middle" fill="#e05a5a" font-size="14">▲</text>
  <text x="540" y="240" text-anchor="middle" fill="#1a2330" font-size="11" font-weight="bold">Warnblinkschalter</text>
  <text x="540" y="254" text-anchor="middle" fill="#2a7a3a" font-size="10">аварийка</text>

  <!-- gear lever -->
  <line x1="300" y1="430" x2="300" y2="360" stroke="#3a3f48" stroke-width="9" stroke-linecap="round"/>
  <circle cx="300" cy="352" r="14" fill="#2b3340"/>
  <text x="300" y="356" text-anchor="middle" fill="#fff" font-size="9">N</text>
  <text x="300" y="450" text-anchor="middle" fill="#1a2330" font-size="12" font-weight="bold">der Schalthebel</text>
  <text x="300" y="464" text-anchor="middle" fill="#2a7a3a" font-size="11">рычаг КПП</text>

  <!-- handbrake -->
  <line x1="430" y1="420" x2="470" y2="370" stroke="#3a3f48" stroke-width="9" stroke-linecap="round"/>
  <circle cx="472" cy="366" r="9" fill="#e05a5a"/>
  <text x="475" y="445" text-anchor="middle" fill="#1a2330" font-size="12" font-weight="bold">die Handbremse</text>
  <text x="475" y="459" text-anchor="middle" fill="#2a7a3a" font-size="11">ручной тормоз</text>

  <!-- pedals -->
  <g>
    <rect x="70" y="350" width="26" height="46" rx="5" fill="#3a3f48"/>
    <rect x="108" y="350" width="26" height="46" rx="5" fill="#3a3f48"/>
    <rect x="146" y="350" width="26" height="46" rx="5" fill="#3a3f48"/>
    <text x="83" y="412" text-anchor="middle" fill="#1a2330" font-size="10">Kupplung</text>
    <text x="121" y="412" text-anchor="middle" fill="#1a2330" font-size="10">Bremse</text>
    <text x="159" y="412" text-anchor="middle" fill="#1a2330" font-size="10">Gas</text>
    <text x="83" y="426" text-anchor="middle" fill="#2a7a3a" font-size="9">сцепление</text>
    <text x="121" y="426" text-anchor="middle" fill="#2a7a3a" font-size="9">тормоз</text>
    <text x="159" y="426" text-anchor="middle" fill="#2a7a3a" font-size="9">газ</text>
    <text x="121" y="345" text-anchor="middle" fill="#1a2330" font-size="12" font-weight="bold">die Pedale</text>
  </g>
</svg>
