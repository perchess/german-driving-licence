<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="sans-serif">
  <style>
    .road { fill: #ddd; }
    .edge { stroke: #fff; stroke-width: 3; fill: none; }
    .car { fill: #1976d2; stroke: #0d47a1; stroke-width: 1.5; }
    .head { font-size: 16px; font-weight: 700; fill: #111; }
    .sub { font-size: 13px; fill: #111; }
    .force { stroke: #c62828; stroke-width: 3; fill: none; marker-end: url(#arrR); }
    .vel { stroke: #2e7d32; stroke-width: 2; fill: none; marker-end: url(#arrG); }
    .center { fill: #333; }
    .formula { font-size: 14px; font-weight: 700; fill: #c62828; }
  </style>
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text class="head" x="20" y="22">Fliehkraft (центробежная) в повороте</text>

  <!-- Curved road -->
  <path d="M 50 320 Q 50 60 350 60" stroke="#ddd" stroke-width="100" fill="none" stroke-linecap="butt"/>
  <path d="M 50 320 Q 50 60 350 60" class="edge"/>
  <path d="M 150 320 Q 150 160 350 160" class="edge"/>

  <!-- Car on the road -->
  <g transform="translate(80, 180) rotate(-50)">
    <rect class="car" x="-18" y="-12" width="36" height="24" rx="3"/>
  </g>

  <!-- Center of curve -->
  <circle class="center" cx="350" cy="320" r="4"/>
  <text class="sub" x="358" y="316">центр поворота</text>
  <text class="sub" x="358" y="332">(радиус r)</text>

  <!-- Force arrow (outward, perpendicular to road) -->
  <line class="force" x1="80" y1="180" x2="20" y2="220"/>
  <text class="formula" x="6" y="240">F (наружу)</text>

  <!-- Velocity arrow (along road, tangent) -->
  <line class="vel" x1="80" y1="180" x2="125" y2="120"/>
  <text class="sub" x="100" y="105" fill="#2e7d32" font-weight="700">v</text>

  <!-- Formula box -->
  <rect x="270" y="200" width="220" height="140" fill="#fff" stroke="#888"/>
  <text class="formula" x="282" y="225">F ∝ m × v² / r</text>
  <text class="sub" x="282" y="248">×2 скорость → ×4 сила!</text>
  <text class="sub" x="282" y="268">меньше радиус → больше сила</text>
  <text class="sub" x="282" y="288">больше масса → больше сила</text>
  <text class="sub" x="282" y="316" font-weight="700">Что делать:</text>
  <text class="sub" x="282" y="332">тормозить ДО входа,</text>
  <text class="sub" x="282" y="348">газ — на выходе.</text>
</svg>
